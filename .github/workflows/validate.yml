name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Checkout pinned scanner source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: 9batalion/coderisktools-scanner
          ref: 1c45de48edf1a36d3fda332ffa5e59da9fcd4631
          path: .ci/coderisktools-scanner
      - name: Install pinned scanner
        run: |
          python3 -m venv .ci/scanner-venv
          .ci/scanner-venv/bin/python -m pip install --quiet --no-deps .ci/coderisktools-scanner
      - name: Derive ruleset provenance
        run: echo "RULESET_DIGEST=$(.ci/scanner-venv/bin/python scripts/ruleset_digest.py)" >> "$GITHUB_ENV"
      - name: Move scanner runtime outside workspace
        run: |
          mv .ci/scanner-venv "$RUNNER_TEMP/scanner-venv"
          mkdir -p "$RUNNER_TEMP/scanner-bin"
          printf '%s\n' '#!/usr/bin/env bash' 'exec "$RUNNER_TEMP/scanner-venv/bin/python" -m src "$@"' > "$RUNNER_TEMP/scanner-bin/secret-scanner"
          chmod 755 "$RUNNER_TEMP/scanner-bin/secret-scanner"
          rm -rf .ci/coderisktools-scanner .ci
      - name: Run tests
        run: python3 -m unittest discover -s tests -v
      - name: Compile Python
        run: python3 -m py_compile src/observatory/*.py tests/**/*.py
      - name: Validate benchmark contract
        run: |
          PYTHONPATH=src python3 - <<'PY'
          from observatory.benchmark import load_manifest
          manifest = load_manifest('benchmark/manifest.json')
          assert manifest['quality']['min_precision'] >= 0
          assert manifest['quality']['min_recall'] >= 0
          assert manifest['quality']['min_f1'] >= 0
          assert manifest['performance']['max_total_duration_ms'] > 0
          assert all(case.get('ground_truth') in {'positive', 'negative'} for case in manifest['cases'])
          print(f"benchmark contract: PASS ({len(manifest['cases'])} cases)")
          PY
      - name: Run real scanner benchmark
        run: |
          PATH="$RUNNER_TEMP/scanner-bin:$RUNNER_TEMP/scanner-venv/bin:$PATH" PYTHONPATH=src \
            python3 -m observatory benchmark \
            --manifest benchmark/manifest.json \
            --ruleset-digest "$RULESET_DIGEST" \
            --json
      - name: Run real scanner self-scan
        run: |
          PATH="$RUNNER_TEMP/scanner-bin:$RUNNER_TEMP/scanner-venv/bin:$PATH" PYTHONPATH=src \
            python3 -m observatory self-scan \
            --path . \
            --ruleset-digest "$RULESET_DIGEST" \
            --json
      - name: Build static status page offline
        run: |
          rm -rf "$RUNNER_TEMP/observatory-status"
          PYTHONPATH=src python3 -m observatory status \
            --output-dir "$RUNNER_TEMP/observatory-status" \
            --generated-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-sha "$GITHUB_SHA" \
            --reports 0 --digests 0 --retractions 0 --partial-scans 0 \
            --feed-status healthy --self-scan-decision PUBLISH \
            --self-scan-findings 0 --benchmark-passed --json
          PYTHONPATH=src python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          root = Path(os.environ["RUNNER_TEMP"]) / "observatory-status"
          status = json.loads((root / "status.json").read_text())
          assert status["last_build_sha"] == os.environ["GITHUB_SHA"]
          assert status["self_scan"]["finding_count"] == 0
          assert status["benchmark"]["passed"] is True
          assert (root / "index.html").is_file()
          assert b"Content-Security-Policy" in (root / "index.html").read_bytes()
          print("static status build: PASS")
          PY
      - name: Check action pins
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          for path in pathlib.Path('.github/workflows').glob('*.yml'):
              text = path.read_text()
              for line in text.splitlines():
                  if line.lstrip().startswith('- uses:'):
                      match = line.split('uses:', 1)[1].split('#', 1)[0].strip()
                      if not re.fullmatch(r'.+@[0-9a-f]{40}', match):
                          raise SystemExit(f'unpinned action: {match}')
          print('action pins: PASS')
          PY
